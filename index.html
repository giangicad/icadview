<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ICAD HTML 3D Library</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7}
header{background:#0b5cab;color:#fff;padding:18px;text-align:center}
header h1{margin:0}
.search{padding:18px;text-align:center}
.search input{width:420px;max-width:90%;padding:10px;font-size:17px;border-radius:8px;border:1px solid #ccc}
#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.15);transition:.2s}
.card:hover{transform:translateY(-4px)}
.preview{height:180px;background:#d9e3ef;display:flex;align-items:center;justify-content:center;font-size:64px}
.info{padding:14px}
.part{font-size:22px;font-weight:bold}
.date{color:#666;font-size:14px}
.btn{display:block;margin-top:12px;text-align:center;background:#0b5cab;color:#fff;text-decoration:none;padding:10px;border-radius:8px}
.btn:hover{background:#084887}
</style>
</head>
<body>
<header>
<h1>ICAD HTML 3D Library</h1>
<div>HTML 3D Viewer Gallery</div>
</header>

<div class="search">
<input id="search" placeholder="🔍 注番検索">
</div>

<div id="gallery"></div>

<script>
const products=[
{part:"JT2857",date:"2026/07/14",viewer:"html/A001245.html"},
{part:"JT2858",date:"2026/07/14",viewer:"html/A001246.html"},
{part:"JT2859",date:"2026/07/13",viewer:"html/A001247.html"},
{part:"JT2860",date:"2026/07/13",viewer:"html/A001248.html"},
{part:"JT2861",date:"2026/07/12",viewer:"html/A001249.html"},
{part:"JT2862",date:"2026/07/12",viewer:"html/A001250.html"},
{part:"JT2863",date:"2026/07/11",viewer:"html/A001251.html"},
{part:"JT2864",date:"2026/07/11",viewer:"html/A001252.html"},
{part:"JT2865",date:"2026/07/10",viewer:"html/A001253.html"},
{part:"JT2866",date:"2026/07/10",viewer:"html/A001254.html"}
];

const gallery=document.getElementById("gallery");

function draw(list){
 gallery.innerHTML="";
 list.forEach(p=>{
  gallery.innerHTML+=`
  <div class="card">
   <div class="preview">🧊</div>
   <div class="info">
    <div class="part">${p.part}</div>
    <div class="date">📅 ${p.date}</div>
    <a class="btn" href="${p.viewer}" target="_blank">🧊 OPEN HTML 3D</a>
   </div>
  </div>`;
 });
}
draw(products);

document.getElementById("search").addEventListener("input",e=>{
 const k=e.target.value.toUpperCase();
 draw(products.filter(p=>p.part.toUpperCase().includes(k)));
});
</script>
</body>
</html>
